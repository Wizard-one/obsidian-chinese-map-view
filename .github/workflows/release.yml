name: Build and Release

on:
    push:
        branches: [master, main]
        tags: ['v*']

jobs:
    build:
        runs-on: ubuntu-latest

        steps:
            - name: Checkout code
              uses: actions/checkout@v4

            - name: Setup Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: '18'
                  cache: 'npm'

            - name: Install dependencies
              run: npm ci

            - name: Run build
              run: npm run build

            - name: Create zip package
              run: |
                  cd dist
                  zip -r ../obsidian-chinese-map-view-v${{ github.ref_name }}.zip .
                  cd ..

            - name: Upload build artifacts
              uses: actions/upload-artifact@v4
              with:
                  name: obsidian-chinese-map-view
                  path: obsidian-chinese-map-view-v${{ github.ref_name }}.zip

    release:
        needs: build
        runs-on: ubuntu-latest
        if: startsWith(github.ref, 'refs/tags/v')

        steps:
            - name: Checkout code
              uses: actions/checkout@v4

            - name: Download build artifacts
              uses: actions/download-artifact@v4
              with:
                  name: obsidian-chinese-map-view

            - name: Create Release
              id: create_release
              uses: actions/create-release@v1
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
              with:
                  tag_name: ${{ github.ref }}
                  release_name: Release ${{ github.ref }}
                  draft: false
                  prerelease: false

            - name: Upload Release Asset
              uses: actions/upload-release-asset@v1
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
              with:
                  upload_url: ${{ steps.create_release.outputs.upload_url }}
                  asset_path: ./obsidian-chinese-map-view-v${{ github.ref_name }}.zip
                  asset_name: obsidian-chinese-map-view-v${{ github.ref_name }}.zip
                  asset_content_type: application/zip
